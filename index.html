
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EZEH ACADEMY - Premium LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-red: #ef4444;
      }
      body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at center, #0f0f0f 0%, #050505 100%);
        color: white;
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--brand-red);
      }
      .prose h1, .prose h2, .prose h3 { color: white !important; font-weight: 800 !important; }
      .prose p { color: #a1a1aa !important; line-height: 1.8; }
      .prose strong { color: white !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
